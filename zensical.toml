[project]
site_name = "Designing for Discovery: Shaping Imageomics Tools for Biologists"
site_url = "https://imageomics.github.io/conference-tutorials-2026/"
site_description = "Hands-on tutorials for Imageomics tools presented at the first Imageomics Conference."

repo_url = "https://github.com/Imageomics/conference-tutorials-2026"
repo_name = "Imageomics/conference-tutorials-2026"

copyright = "Copyright &copy; 2026 Imageomics Institute"

extra_css = ["stylesheets/extra.css"]

nav = [
    { "Home" = "index.md" },
    { "Tutorials" = [
        { "Classification" = [
            { "pybioclip" = "tutorials/pybioclip.md" },
        ]},
        { "Embedding Exploration" = [
            { "Embedding Explorer" = "tutorials/embedding-explorer.md" },
        ]},
        { "Segmentation & Known Trait Extraction" = [
            { "SST" = "tutorials/sst.md" },
        ]},
        { "Interpretability" = [
            { "Prompt-CAM" = "tutorials/prompt-cam.md" },
            { "Finer-CAM" = "tutorials/finer-cam.md" },
        ]},
        { "Similarity Search & Discovery" = [
            { "BioCLIP Search Lite" = "tutorials/bioclip-search-lite.md" },
            { "SAE" = "tutorials/sae.md" },
        ]},
    ]},
]

[project.theme]
favicon = "assets/tools-logo_black.svg"
logo = "assets/tools-logo_black.svg"
language = "en"
features = [
    "content.code.copy",
    "content.code.select",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
